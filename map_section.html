<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa - Dra. Leticia Ranghiere</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    background:#1a1a18;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }

  .map-section{
    width:100%;
    max-width:390px;
    padding:0 20px;
  }

  .map-label{
    font-size:10px;
    font-weight:600;
    letter-spacing:3px;
    text-transform:uppercase;
    color:#C8A88E;
    opacity:0.5;
    margin-bottom:16px;
  }

  .map-container{
    position:relative;
    width:100%;
    border-radius:24px;
    overflow:hidden;
    cursor:pointer;
    transform:translateZ(0);
    will-change:transform;
    transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  .map-container:hover{
    transform:scale(1.01) translateZ(0);
  }

  .map-svg{
    display:block;
    width:100%;
    height:auto;
  }

  /* Vignette overlay */
  .map-vignette{
    position:absolute;
    inset:0;
    border-radius:24px;
    background:radial-gradient(ellipse 70% 60% at 55% 45%, transparent 30%, rgba(26,26,24,0.85) 100%);
    pointer-events:none;
  }

  /* Glow ring pulse — CSS puro */
  @keyframes pulse-ring{
    0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.25}
    50%{transform:translate(-50%,-50%) scale(1.4);opacity:0}
  }
  .pin-glow-ring{
    animation:pulse-ring 2.4s ease-in-out infinite;
    transform-origin:center center;
  }

  /* Street base — always visible once faded in */
  .street-base{opacity:0;transition:opacity 0.5s ease}
  .street-base.visible{opacity:1}

  /* Intersection points */
  .intersection{opacity:0;transition:opacity 0.6s ease}
  .intersection.visible{opacity:1}

  /* Pin entrance */
  @keyframes pin-enter{
    0%{transform:translate(-50%,-50%) scale(0) translateY(-20px);opacity:0}
    60%{transform:translate(-50%,-50%) scale(1.15) translateY(0);opacity:1}
    80%{transform:translate(-50%,-50%) scale(0.95);opacity:1}
    100%{transform:translate(-50%,-50%) scale(1);opacity:1}
  }
  .pin-group{
    opacity:0;
    transform:translate(-50%,-50%) scale(0);
  }
  .pin-group.animate{
    animation:pin-enter 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }

  /* Labels */
  .map-text-label{opacity:0;transition:opacity 0.8s ease}
  .map-text-label.visible{opacity:1}

  /* Address card below map */
  .map-address{
    margin-top:16px;
    display:flex;
    align-items:center;
    gap:12px;
    padding:16px 18px;
    background:#2C2C2A;
    border-radius:16px;
    cursor:pointer;
    transition:background 0.2s;
    text-decoration:none;
  }
  .map-address:hover{background:#353533}

  .map-address-icon{
    width:42px;height:42px;
    border-radius:12px;
    background:rgba(200,168,142,0.12);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .map-address-icon svg{width:20px;height:20px}

  .map-address-text{flex:1;min-width:0}
  .map-address-title{
    font-size:14px;font-weight:600;color:#F5F0EB;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .map-address-sub{
    font-size:12px;color:#C8A88E;opacity:0.6;margin-top:2px;
  }
  .map-address-arrow{
    font-size:16px;color:#C8A88E;opacity:0.5;flex-shrink:0;
  }
</style>
</head>
<body>

<section class="map-section">
  <div class="map-label">Localiza&ccedil;&atilde;o</div>

  <div class="map-container" id="mapContainer" role="button" tabindex="0"

      <!-- R. Miguel Delloiagono -->
      <path class="street-draw" data-dur="3600" data-delay="2000" data-pause="1600"

      <!-- R. Joao Alves Silva Jr -->
      <path class="street-draw" data-dur="2800" data-delay="1500" data-pause="2500"

      <!-- R. Salvador Delloiagono -->

      <!-- R. Toronto -->
      <path class="street-draw" data-dur="3400" data-delay="1000" data-pause="2400"

      <!-- Vargas x Bianco Molina -->

      <!-- Hudson x Salvador -->

      <!-- Miguel x Costa Mello -->

      <!-- Bianco Molina x Joao Alves -->

                fill="none" stroke="#C8A88E" stroke-width="2" opacity="0.25"
                style="transform-origin:195px 140px"/>

            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
            font-size="5.5" font-weight="500"

            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
            font-size="7" font-weight="600" letter-spacing="1.5"
            style="transition-delay:3400ms">

<script>
(function(){
  var container = document.getElementById('mapContainer');
  var routePath = document.getElementById('routePath');
  var routeGlow = document.getElementById('routeGlowBg');
  var pinGroup = document.getElementById('pinGroup');
  var distLabel = document.getElementById('distanceLabel');
  var animated = false;

  // === DRAW LOOP ENGINE ===
  // Animates a single SVG element: draw in -> pause -> fade out -> pause -> repeat
  function createDrawLoop(el, duration, pauseAfter, pauseBefore){
    var len = el.getTotalLength ? el.getTotalLength() :
      Math.sqrt(Math.pow(parseFloat(el.getAttribute('x2')||0)-parseFloat(el.getAttribute('x1')||0),2) +
                Math.pow(parseFloat(el.getAttribute('y2')||0)-parseFloat(el.getAttribute('y1')||0),2));

    el.style.strokeDasharray = len;
    el.style.strokeDashoffset = len;
    el.style.opacity = '0';

    var phase = 'waiting'; // waiting -> drawing -> pausing -> erasing -> cooldown
    var phaseStart = 0;
    var fadeIn = 300;
    var fadeOut = 400;

    function tick(ts){
      if(!phaseStart) phaseStart = ts;
      var elapsed = ts - phaseStart;

      if(phase === 'waiting'){
        if(elapsed >= pauseBefore){
          phase = 'drawing';
          phaseStart = ts;
        }
      }
      else if(phase === 'drawing'){
        var p = Math.min(elapsed / duration, 1);
        // Ease out cubic
        var ease = 1 - Math.pow(1 - p, 3);
        el.style.strokeDashoffset = len * (1 - ease);
        // Fade in at start
        el.style.opacity = Math.min(elapsed / fadeIn, 1) * parseFloat(el.getAttribute('opacity') || 1);
        if(p >= 1){
          phase = 'pausing';
          phaseStart = ts;
        }
      }
      else if(phase === 'pausing'){
        el.style.strokeDashoffset = '0';
        if(elapsed >= pauseAfter){
          phase = 'erasing';
          phaseStart = ts;
        }
      }
      else if(phase === 'erasing'){
        var p2 = Math.min(elapsed / fadeOut, 1);
        el.style.opacity = (1 - p2) * parseFloat(el.getAttribute('opacity') || 1);
        if(p2 >= 1){
          el.style.strokeDashoffset = len;
          el.style.opacity = '0';
          phase = 'waiting';
          phaseStart = ts;
        }
      }

      requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
  }

  // === ROUTE DRAW LOOP ===
  var routeLen = routePath.getTotalLength();

  function startRouteLoop(){
    routePath.style.strokeDasharray = routeLen;
    routePath.style.strokeDashoffset = routeLen;
    routeGlow.style.strokeDasharray = routeLen;
    routeGlow.style.strokeDashoffset = routeLen;
    routeGlow.style.opacity = '0';

    var phase = 'drawing';
    var phaseStart = 0;
    var drawDur = 3000;
    var pauseDur = 2000;
    var fadeDur = 800;

    function tick(ts){
      if(!phaseStart) phaseStart = ts;
      var elapsed = ts - phaseStart;

      if(phase === 'drawing'){
        var p = Math.min(elapsed / drawDur, 1);
        var ease = 1 - Math.pow(1 - p, 3);
        var offset = routeLen * (1 - ease);
        routePath.style.strokeDashoffset = offset;
        routeGlow.style.strokeDashoffset = offset;
        routeGlow.style.opacity = 0.25 * Math.min(elapsed / 500, 1);
        routePath.style.opacity = 0.90;
        if(p >= 1){
          phase = 'pausing';
          phaseStart = ts;
        }
      }
      else if(phase === 'pausing'){
        routePath.style.strokeDashoffset = '0';
        routeGlow.style.strokeDashoffset = '0';
        if(elapsed >= pauseDur){
          phase = 'fading';
          phaseStart = ts;
        }
      }
      else if(phase === 'fading'){
        var p2 = Math.min(elapsed / fadeDur, 1);
        routePath.style.opacity = 0.90 * (1 - p2);
        routeGlow.style.opacity = 0.25 * (1 - p2);
        if(p2 >= 1){
          routePath.style.strokeDashoffset = routeLen;
          routeGlow.style.strokeDashoffset = routeLen;
          routePath.style.opacity = '0';
          routeGlow.style.opacity = '0';
          phase = 'cooldown';
          phaseStart = ts;
        }
      }
      else if(phase === 'cooldown'){
        if(elapsed >= 500){
          phase = 'drawing';
          phaseStart = ts;
        }
      }

      requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
  }

  // === MAIN ANIMATION SEQUENCE ===
  function startAnimation(){
    if(animated) return;
    animated = true;

    // 1. Street bases fade-in
    var bases = document.querySelectorAll('.street-base');
    bases.forEach(function(s){ s.classList.add('visible') });

    // 2. Intersections (400ms)
    setTimeout(function(){
      var ints = document.querySelectorAll('.intersection');
      ints.forEach(function(i){ i.classList.add('visible') });
    }, 400);

    // 3. Street draw loops (600ms) — each street starts its own draw loop
    setTimeout(function(){
      var draws = document.querySelectorAll('.street-draw');
      draws.forEach(function(el){
        var dur = parseInt(el.dataset.dur) || 4000;
        var delay = parseInt(el.dataset.delay) || 0;
        var pause = parseInt(el.dataset.pause) || 1500;
        createDrawLoop(el, dur, pause, delay);
      });
    }, 600);

    // 4. Route draw loop (800ms)
    setTimeout(function(){
      startRouteLoop();
    }, 800);

    // 5. Pin bounce (2800ms)
    setTimeout(function(){
      pinGroup.classList.add('animate');
    }, 2800);

    // 6. Labels (3200ms)
    setTimeout(function(){
      var labels = document.querySelectorAll('.map-text-label');
      labels.forEach(function(l){ l.classList.add('visible') });
      distLabel.setAttribute('opacity', '0.35');
      distLabel.style.transition = 'opacity 0.8s ease';
    }, 3200);
  }

  // IntersectionObserver
  if('IntersectionObserver' in window){
    var obs = new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting){
          startAnimation();
          obs.unobserve(e.target);
        }
      });
    }, {threshold: 0.3});
    obs.observe(container);
  } else {
    startAnimation();
  }

  // Hover parallax
  container.addEventListener('mousemove', function(e){
    var rect = container.getBoundingClientRect();
    var x = (e.clientX - rect.left) / rect.width - 0.5;
    var y = (e.clientY - rect.top) / rect.height - 0.5;
    var svg = container.querySelector('.map-svg');
    svg.style.transform = 'translate(' + (x * 5) + 'px,' + (y * 5) + 'px)';
  });

  container.addEventListener('mouseleave', function(){
    var svg = container.querySelector('.map-svg');
    svg.style.transform = 'translate(0,0)';
    svg.style.transition = 'transform 0.4s ease';
    setTimeout(function(){ svg.style.transition = '' }, 400);
  });

  // Click
  container.addEventListener('click', function(){
    window.open('https://maps.google.com/maps?q=R.+Galileu+Galilei,+1685+-+Jardim+Iraj%C3%A1,+Ribeir%C3%A3o+Preto+-+SP', '_blank');
  });

  // Keyboard
  container.addEventListener('keydown', function(e){
    if(e.key === 'Enter' || e.key === ' '){
      e.preventDefault();
      container.click();
    }
  });
})();
</script>
